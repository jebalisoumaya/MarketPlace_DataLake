x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-webserver:8080/execution/"
    AIRFLOW__API_AUTH__JWT_SECRET: "8285525c7b045ebfac3570515d97c60d6c202442f23739f02e9290d318b0b2f2"

    # --- Connexions (lues automatiquement via les variables AIRFLOW_CONN_*) ---
    # MarketplaceAPIHook : password = token Bearer
    AIRFLOW_CONN_MARKETPLACE_API_DEFAULT: "http://:${API_TOKEN:-dev-secret-token}@api-simulee:5000"
    # PostgresHook vers le DWH
    AIRFLOW_CONN_POSTGRES_DWH_DEFAULT: "postgresql://dwh_user:dwh_password@postgres-dwh:5432/dwh"
    # S3Hook vers MinIO (compatible S3)
    AIRFLOW_CONN_MINIO_DEFAULT: "aws://minioadmin:minioadmin123@?endpoint_url=http%3A%2F%2Fminio%3A9000"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - marketplace-net

services:
  # ---------------------------------------------------------------------
  # Metadata DB d'Airflow
  # ---------------------------------------------------------------------
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    networks:
      - marketplace-net

  # ---------------------------------------------------------------------
  # Data Warehouse (staging / dwh / analytics)
  # ---------------------------------------------------------------------
  postgres-dwh:
    image: postgres:16
    environment:
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_password
      POSTGRES_DB: dwh
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
      - ./postgres-init/dwh:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dwh_user"]
      interval: 5s
      retries: 10
    networks:
      - marketplace-net

  # ---------------------------------------------------------------------
  # Stockage objet (raw/ partitionne par dt=)
  # ---------------------------------------------------------------------
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 10
    networks:
      - marketplace-net

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin123) do sleep 2; done;
      mc mb -p local/raw;
      exit 0;
      "
    networks:
      - marketplace-net

  # ---------------------------------------------------------------------
  # API Marketplace simulee
  # ---------------------------------------------------------------------
  api-simulee:
    build: ./api-simulee
    environment:
      API_TOKEN: ${API_TOKEN:-dev-secret-token}
    ports:
      - "5000:5000"
    networks:
      - marketplace-net

  # ---------------------------------------------------------------------
  # Airflow
  # ---------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname Airflow \
          --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8084:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------
  # Dashboard Streamlit (option 2) + anomalies
  # ---------------------------------------------------------------------
  streamlit:
    build: ./streamlit
    environment:
      DWH_HOST: postgres-dwh
      DWH_PORT: 5432
      DWH_DBNAME: dwh
      DWH_USER: dwh_user
      DWH_PASSWORD: dwh_password
    ports:
      - "8501:8501"
    depends_on:
      - postgres-dwh
    networks:
      - marketplace-net

volumes:
  postgres_airflow_data:
  postgres_dwh_data:
  minio_data:
  airflow_logs:

networks:
  marketplace-net:
    driver: bridge
